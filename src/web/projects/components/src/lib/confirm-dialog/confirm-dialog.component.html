<h2 mat-dialog-title class="qq-confirm-dialog__title">{{ data.title }}</h2>

<mat-dialog-content class="qq-confirm-dialog__content">
  <p>{{ data.message }}</p>
</mat-dialog-content>

<mat-dialog-actions class="qq-confirm-dialog__actions" align="end">
  <button mat-button (click)="cancel()" class="qq-confirm-dialog__cancel">
    Cancel
  </button>
  <button
    mat-flat-button
    (click)="confirm()"
    class="qq-confirm-dialog__confirm"
    [class.qq-confirm-dialog__confirm--destructive]="data.destructive"
    [color]="data.destructive ? 'warn' : 'primary'"
  >
    Confirm
  </button>
</mat-dialog-actions>
