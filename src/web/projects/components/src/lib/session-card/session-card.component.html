<mat-card class="qq-session-card">
  <mat-card-header class="qq-session-card__header">
    <mat-card-title class="qq-session-card__title">{{ title }}</mat-card-title>
    <span class="qq-session-card__status-chip qq-session-card__status-chip--{{ status }}">
      {{ status }}
    </span>
  </mat-card-header>

  <mat-card-content class="qq-session-card__content">
    <div class="qq-session-card__countdown">
      <ng-content select="[slot=countdown]"></ng-content>
    </div>
  </mat-card-content>

  <mat-card-actions class="qq-session-card__actions">
    <ng-content select="[slot=actions]"></ng-content>
  </mat-card-actions>
</mat-card>
