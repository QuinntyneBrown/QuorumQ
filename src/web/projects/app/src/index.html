<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>QuorumQ</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">

  <style>
    :root { background: #FBF7F1; color-scheme: light; }
    @media (prefers-color-scheme: dark) {
      :root { background: #141312; color-scheme: dark; }
    }
  </style>
  <script>
    (function () {
      try {
        var t = localStorage.getItem('qq-theme');
        if (t === 'dark') document.documentElement.classList.add('theme-dark');
        else if (t === 'system' || !t) {
          if (matchMedia('(prefers-color-scheme: dark)').matches)
            document.documentElement.classList.add('theme-dark');
        }
      } catch (_) {}
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
