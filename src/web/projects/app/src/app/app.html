<a class="skip-link" href="#main">Skip to content</a>

<mat-toolbar class="app-bar" color="primary">
  @if (!isMobile()) {
    <button mat-icon-button aria-label="Toggle navigation" (click)="toggleDrawer()">
      <mat-icon>menu</mat-icon>
    </button>
  }
  <span class="app-bar__title">QuorumQ</span>
  <span class="spacer"></span>
  <button mat-icon-button aria-label="Account menu" [matMenuTriggerFor]="accountMenu">
    <mat-icon>account_circle</mat-icon>
  </button>
</mat-toolbar>

<mat-menu #accountMenu="matMenu">
  <button mat-menu-item routerLink="/settings">
    <mat-icon>settings</mat-icon>
    <span>Settings</span>
  </button>
  <button mat-menu-item>
    <mat-icon>info</mat-icon>
    <span>About</span>
  </button>
  <button mat-menu-item>
    <mat-icon>logout</mat-icon>
    <span>Sign out</span>
  </button>
</mat-menu>

@if (isMobile()) {
  <!-- Mobile: content + bottom nav -->
  <main id="main" tabindex="-1" class="app-content app-content--mobile">
    <router-outlet />
  </main>

  <nav class="bottom-nav" role="navigation" aria-label="Primary navigation" data-testid="bottom-nav">
    @for (item of navItems; track item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive="bottom-nav__item--active"
        class="bottom-nav__item"
        [attr.aria-label]="item.label"
      >
        <mat-icon class="bottom-nav__icon">{{ item.icon }}</mat-icon>
        <span class="bottom-nav__label">{{ item.label }}</span>
      </a>
    }
  </nav>
} @else {
  <!-- Tablet/Desktop: sidenav rail or drawer -->
  <mat-sidenav-container class="app-sidenav-container">
    <mat-sidenav
      class="app-sidenav"
      [class.app-sidenav--rail]="!isDesktop()"
      [class.app-sidenav--drawer]="isDesktop()"
      mode="side"
      [opened]="isDesktop() ? drawerOpen() : true"
      role="navigation"
      aria-label="Primary navigation"
      data-testid="nav-rail"
    >
      <mat-nav-list>
        @for (item of navItems; track item.route) {
          <a
            mat-list-item
            [routerLink]="item.route"
            routerLinkActive="nav-item--active"
            [attr.aria-label]="item.label"
          >
            <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
            @if (isDesktop()) {
              <span matListItemTitle>{{ item.label }}</span>
            }
          </a>
        }
      </mat-nav-list>
    </mat-sidenav>

    <mat-sidenav-content>
      <main id="main" tabindex="-1" class="app-content">
        <router-outlet />
      </main>
    </mat-sidenav-content>
  </mat-sidenav-container>
}
